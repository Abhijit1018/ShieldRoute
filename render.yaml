services:
  - type: web
    name: shieldroute-api
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: OTP_PROVIDER
        value: mock
      - key: OTP_MOCK_FALLBACK
        value: "true"
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
      - key: PAYMENT_PROVIDER
        value: mock
      - key: PAYMENT_MOCK_FALLBACK
        value: "true"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
